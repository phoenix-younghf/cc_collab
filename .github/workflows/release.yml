name: Draft Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.ref_name }}
      DIST_DIR: dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build platform archives and manifest input
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          python3 scripts/build_release_payload.py build \
            --output-dir "${DIST_DIR}" \
            --version "${VERSION}" \
            --repo "${RELEASE_REPO}"

      - name: Ensure draft release exists
        id: ensure_release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/release_workflow.py ensure-draft-release \
            --repo "${RELEASE_REPO}" \
            --tag "${RELEASE_TAG}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Upload platform archives first
        id: release_identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/release_workflow.py upload-assets \
            --repo "${RELEASE_REPO}" \
            --release-id "${{ steps.ensure_release.outputs.release_id }}" \
            --clobber \
            --github-output "${GITHUB_OUTPUT}" \
            "${DIST_DIR}/ccollab-windows-x64.zip" \
            "${DIST_DIR}/ccollab-macos-universal.tar.gz" \
            "${DIST_DIR}/ccollab-linux-x64.tar.gz"

      - name: Generate final ccollab-manifest.json
        run: |
          set -euo pipefail
          python3 scripts/build_release_payload.py write-manifest \
            --manifest-input "${DIST_DIR}/ccollab-manifest-input.json" \
            --output-path "${DIST_DIR}/ccollab-manifest.json" \
            --release-id "${{ steps.release_identity.outputs.release_id }}" \
            --windows-asset-id "${{ steps.release_identity.outputs.windows_asset_id }}" \
            --macos-asset-id "${{ steps.release_identity.outputs.macos_asset_id }}" \
            --linux-asset-id "${{ steps.release_identity.outputs.linux_asset_id }}"

      - name: Upload final manifest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/release_workflow.py upload-assets \
            --repo "${RELEASE_REPO}" \
            --release-id "${{ steps.release_identity.outputs.release_id }}" \
            --clobber \
            "${DIST_DIR}/ccollab-manifest.json"

      - name: Keep release in draft state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/release_workflow.py ensure-draft-release \
            --repo "${RELEASE_REPO}" \
            --tag "${RELEASE_TAG}"
