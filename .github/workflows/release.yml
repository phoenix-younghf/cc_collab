name: Draft Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.ref_name }}
      DIST_DIR: dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build platform archives and manifest input
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          python3 scripts/build_release_payload.py build \
            --output-dir "${DIST_DIR}" \
            --version "${VERSION}" \
            --repo "${RELEASE_REPO}"

      - name: Resolve release as draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_api_path="repos/${RELEASE_REPO}/releases/tags/${RELEASE_TAG}"
          resolve_release_id() {
            gh api "${release_api_path}" --jq '.id' 2>/dev/null || true
          }
          release_id="$(resolve_release_id)"
          if [ -z "${release_id}" ]; then
            gh release create "${RELEASE_TAG}" \
              --repo "${RELEASE_REPO}" \
              --title "${RELEASE_TAG}" \
              --notes "Draft release for ${RELEASE_TAG}" \
              --draft || true
            for attempt in 1 2 3 4 5; do
              release_id="$(resolve_release_id)"
              if [ -n "${release_id}" ]; then
                break
              fi
              sleep 2
            done
          fi
          if [ -z "${release_id}" ]; then
            echo "Failed to resolve release ${RELEASE_TAG} after draft creation."
            exit 1
          fi
          gh api --method PATCH "repos/${RELEASE_REPO}/releases/${release_id}" -f draft=true >/dev/null

      - name: Upload platform archives first
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            "${DIST_DIR}/ccollab-windows-x64.zip" \
            "${DIST_DIR}/ccollab-macos-universal.tar.gz" \
            "${DIST_DIR}/ccollab-linux-x64.tar.gz" \
            --repo "${RELEASE_REPO}" \
            --clobber

      - name: Capture release and asset IDs
        id: release_identity
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_api_path="repos/${RELEASE_REPO}/releases/tags/${RELEASE_TAG}"
          release_id="$(gh api "${release_api_path}" --jq '.id')"
          windows_asset_id="$(gh api "${release_api_path}" --jq '.assets[] | select(.name == "ccollab-windows-x64.zip") | .id')"
          macos_asset_id="$(gh api "${release_api_path}" --jq '.assets[] | select(.name == "ccollab-macos-universal.tar.gz") | .id')"
          linux_asset_id="$(gh api "${release_api_path}" --jq '.assets[] | select(.name == "ccollab-linux-x64.tar.gz") | .id')"
          for asset_id in "${windows_asset_id}" "${macos_asset_id}" "${linux_asset_id}"; do
            if [ -z "${asset_id}" ]; then
              echo "One or more release asset IDs are missing after archive upload."
              exit 1
            fi
          done
          {
            echo "release_id=${release_id}"
            echo "windows_asset_id=${windows_asset_id}"
            echo "macos_asset_id=${macos_asset_id}"
            echo "linux_asset_id=${linux_asset_id}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate final ccollab-manifest.json
        run: |
          set -euo pipefail
          python3 scripts/build_release_payload.py write-manifest \
            --manifest-input "${DIST_DIR}/ccollab-manifest-input.json" \
            --output-path "${DIST_DIR}/ccollab-manifest.json" \
            --release-id "${{ steps.release_identity.outputs.release_id }}" \
            --windows-asset-id "${{ steps.release_identity.outputs.windows_asset_id }}" \
            --macos-asset-id "${{ steps.release_identity.outputs.macos_asset_id }}" \
            --linux-asset-id "${{ steps.release_identity.outputs.linux_asset_id }}"

      - name: Upload final manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            "${DIST_DIR}/ccollab-manifest.json" \
            --repo "${RELEASE_REPO}" \
            --clobber

      - name: Keep release in draft state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="${{ steps.release_identity.outputs.release_id }}"
          gh api --method PATCH "repos/${RELEASE_REPO}/releases/${release_id}" -f draft=true >/dev/null
          is_draft="$(gh api "repos/${RELEASE_REPO}/releases/tags/${RELEASE_TAG}" --jq '.draft')"
          if [ "${is_draft}" != "true" ]; then
            echo "Release ${RELEASE_TAG} must remain draft for manual Windows validation."
            exit 1
          fi
